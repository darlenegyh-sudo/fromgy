<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헤어&메이크업샵 선택하기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fafaf8;--surface:#ffffff;--surface2:#f2f1ef;--accent:#c9727a;--accent2:#e8a598;--gold:#c9a84c;--text:#1a1a1a;--text-dim:#999;--border:rgba(0,0,0,0.08);--glow:0 4px 24px rgba(201,114,122,0.18);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}
  #home{align-items:center;justify-content:center;text-align:center;padding:48px 20px;background:linear-gradient(160deg,#fff8f8 0%,#fafaf8 60%);}
  .logo-badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Black Han Sans',sans-serif;font-size:11px;letter-spacing:3px;padding:6px 18px;border-radius:20px;margin-bottom:20px;}
  h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(32px,7vw,60px);line-height:1.15;margin-bottom:36px;color:var(--text);}
  h1 span{color:var(--accent);}
  .round-selector{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
  .round-btn{background:#fff;border:1.5px solid var(--border);border-radius:40px;color:var(--text-dim);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;padding:10px 22px;transition:all .2s;}
  .round-btn.active,.round-btn:hover{border-color:var(--accent);color:var(--accent);background:#fff5f5;font-weight:700;}
  .info-bar{font-size:13px;color:var(--text-dim);margin-bottom:20px;}
  .info-bar span{color:var(--accent);font-weight:700;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;color:#fff;cursor:pointer;font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;padding:18px 52px;transition:all .25s;box-shadow:var(--glow);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,114,122,0.3);}
  #game{align-items:center;justify-content:flex-start;padding:32px 20px 40px;background:var(--bg);}
  .game-header{text-align:center;margin-bottom:36px;width:100%;}
  .round-label{font-family:'Black Han Sans',sans-serif;font-size:clamp(20px,4vw,32px);margin-bottom:6px;color:var(--text);}
  .match-count{font-size:12px;color:var(--text-dim);margin-top:6px;}
  .progress-track{width:100%;max-width:360px;height:3px;background:var(--border);border-radius:2px;margin:10px auto 0;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
  .vs-arena{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;width:100%;max-width:820px;align-items:center;}
  .vs-badge{font-family:'Black Han Sans',sans-serif;font-size:clamp(22px,5vw,40px);color:var(--accent);text-align:center;opacity:.7;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:.4;transform:scale(.93)}}
  .choice-card{background:#fff;border:2px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .choice-card:hover{border-color:var(--accent);transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(201,114,122,0.2);}
  .choice-card.selected{border-color:var(--gold);animation:selectPop .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(201,168,76,0.3);}
  .choice-card.rejected{opacity:.25;transform:scale(.95);filter:grayscale(.6);}
  @keyframes selectPop{0%{transform:scale(1)}50%{transform:scale(1.05) translateY(-8px)}100%{transform:scale(1.02) translateY(-6px)}}
  .card-img-wrap{width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
  .choice-card:hover .card-img-wrap img{transform:scale(1.05);}
  .card-img-gradient{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(0,0,0,0.25));}
  .card-name{padding:14px 16px;text-align:center;font-family:'Black Han Sans',sans-serif;font-size:clamp(15px,3vw,20px);color:var(--text);}
  .selected-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,0.08);opacity:0;transition:opacity .3s;font-size:56px;z-index:2;}
  .choice-card.selected .selected-overlay{opacity:1;}
  #winner{align-items:center;justify-content:center;text-align:center;padding:48px 20px;background:linear-gradient(160deg,#fffdf5 0%,#fafaf8 70%);}
  .winner-crown{font-size:72px;margin-bottom:12px;animation:crownBounce .9s cubic-bezier(.34,1.56,.64,1);}
  @keyframes crownBounce{from{transform:translateY(-30px) scale(0);opacity:0}to{transform:none;opacity:1}}
  .winner-title{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:4px;color:var(--gold);margin-bottom:14px;}
  .winner-name{font-family:'Black Han Sans',sans-serif;font-size:clamp(32px,7vw,60px);margin-bottom:32px;color:var(--text);}
  .winner-img-frame{width:min(260px,68vw);height:min(260px,68vw);border-radius:50%;overflow:hidden;border:4px solid var(--gold);box-shadow:0 0 40px rgba(201,168,76,0.3);margin:0 auto 36px;animation:revealWinner .8s ease .3s both;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:72px;}
  .winner-img-frame img{width:100%;height:100%;object-fit:cover;}
  @keyframes revealWinner{from{transform:scale(.5) rotate(-8deg);opacity:0}to{transform:none;opacity:1}}
  .btn-restart{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;color:#fff;cursor:pointer;font-family:'Black Han Sans',sans-serif;font-size:16px;letter-spacing:1px;padding:16px 40px;transition:all .2s;box-shadow:var(--glow);margin-top:8px;}
  .btn-restart:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,114,122,0.3);}
  .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
  .confetti-piece{position:absolute;animation:confettiFall linear forwards;}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  @media(max-width:600px){.vs-arena{gap:10px;}.vs-badge{font-size:20px;}.card-name{font-size:13px;padding:10px;}}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<div class="screen active" id="home">
  <div style="width:100%;max-width:600px;margin:0 auto;">
    <div class="logo-badge">✂️ Hair &amp; Make up</div>
    <h1>헤어&amp;<br>메이크업샵<br><span>선택하기</span></h1>
    <div class="info-bar"><span id="cand-count">0</span>개 샵이 등록되어 있어요</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">라운드 선택</div>
    <div class="round-selector" id="round-selector"></div>
    <button class="btn-primary" onclick="startGame()">🏆 지금 시작하기</button>
  </div>
</div>
<div class="screen" id="game">
  <div class="game-header">
    <div class="round-label" id="round-label">4강</div>
    <div class="match-count" id="match-count">1 / 2 경기</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="vs-arena">
    <div class="choice-card" id="card-left" onclick="choose(0)">
      <div class="card-img-wrap" id="img-left"><span id="emoji-left">✂️</span><div class="card-img-gradient"></div><div class="selected-overlay">⭐</div></div>
      <div class="card-name" id="name-left">—</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="choice-card" id="card-right" onclick="choose(1)">
      <div class="card-img-wrap" id="img-right"><span id="emoji-right">✂️</span><div class="card-img-gradient"></div><div class="selected-overlay">⭐</div></div>
      <div class="card-name" id="name-right">—</div>
    </div>
  </div>
</div>
<div class="screen" id="winner">
  <div class="winner-crown">👑</div>
  <div class="winner-title">최종 선택</div>
  <div class="winner-img-frame" id="winner-img-frame">🏆</div>
  <div class="winner-name" id="winner-name">—</div>
  <button class="btn-restart" onclick="goHome()">🔄 다시 하기</button>
</div>

let candidates=[],roundMatches=[],matchIndex=0,currentRound=0,selectedRound=0,isAnimating=false;
window._rw=[];
function init(){candidates=PRESET.map((c,i)=>({id:i,name:c.name,img:c.img}));document.getElementById('cand-count').textContent=candidates.length;buildRoundSelector();}
function buildRoundSelector(){const n=candidates.length,sel=document.getElementById('round-selector');sel.innerHTML='';const possible=[2,4,8,16].filter(r=>r<=n);if(!possible.length)return;if(!selectedRound||!possible.includes(selectedRound))selectedRound=possible[possible.length-1];possible.forEach(r=>{const btn=document.createElement('button');btn.className='round-btn'+(r===selectedRound?' active':'');btn.textContent=r===2?'결승':r===4?'4강':r+'강';btn.onclick=()=>{selectedRound=r;document.querySelectorAll('.round-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};sel.appendChild(btn);});}
function startGame(){const pool=[...candidates].sort(()=>Math.random()-.5).slice(0,selectedRound);currentRound=selectedRound;roundMatches=[];window._rw=[];matchIndex=0;for(let i=0;i<pool.length;i+=2)roundMatches.push([pool[i],pool[i+1]]);showScreen('game');renderMatch();}
function renderMatch(){const total=roundMatches.length,match=roundMatches[matchIndex];const label=currentRound===2?'결승':currentRound===4?'준결승':currentRound+'강';document.getElementById('round-label').textContent=label;document.getElementById('match-count').textContent=(matchIndex+1)+' / '+total+' 경기';document.getElementById('progress-fill').style.width=(matchIndex/total*100)+'%';setCard('left',match[0]);setCard('right',match[1]);document.getElementById('card-left').className='choice-card';document.getElementById('card-right').className='choice-card';}
function setCard(side,cand){const w=document.getElementById('img-'+side),e=document.getElementById('emoji-'+side),n=document.getElementById('name-'+side);if(cand.img){e.style.display='none';let img=w.querySelector('img.gi');if(!img){img=document.createElement('img');img.className='gi';img.style.cssText='width:100%;height:100%;object-fit:cover;transition:transform .4s;position:absolute;top:0;left:0;';w.insertBefore(img,w.firstChild);}img.src=cand.img;}else{e.style.display='';e.textContent='✂️';const img=w.querySelector('img.gi');if(img)img.remove();}n.textContent=cand.name;}
function choose(side){if(isAnimating)return;isAnimating=true;const lc=document.getElementById('card-left'),rc=document.getElementById('card-right');if(side===0){lc.classList.add('selected');rc.classList.add('rejected');}else{rc.classList.add('selected');lc.classList.add('rejected');}const winner=roundMatches[matchIndex][side];setTimeout(()=>{isAnimating=false;matchIndex++;advance(winner);},700);}
function advance(winner){window._rw.push(winner);if(matchIndex>=roundMatches.length){if(window._rw.length===1){showWinner(window._rw[0]);window._rw=[];return;}currentRound=window._rw.length;roundMatches=[];for(let i=0;i<window._rw.length;i+=2)roundMatches.push([window._rw[i],window._rw[i+1]]);matchIndex=0;window._rw=[];}renderMatch();}
function showWinner(cand){const f=document.getElementById('winner-img-frame');f.innerHTML=cand.img?`<img src="${cand.img}" alt="${cand.name}">`:'<span style="font-size:72px">✂️</span>';document.getElementById('winner-name').textContent=cand.name;showScreen('winner');launchConfetti();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){window._rw=[];document.getElementById('confetti').innerHTML='';showScreen('home');}
function launchConfetti(){const c=document.getElementById('confetti');c.innerHTML='';const cols=['#c9727a','#e8a598','#c9a84c','#a8c5b5','#f4e0d9'];for(let i=0;i<70;i++){const el=document.createElement('div');el.className='confetti-piece';const col=cols[Math.floor(Math.random()*cols.length)];el.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${col};width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s;`;c.appendChild(el);}setTimeout(()=>c.innerHTML='',6000);}
init();
</script>
